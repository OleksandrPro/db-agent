services:
  agent:
    build:
      context: .
      dockerfile: src/Dockerfile
    environment:
      - PYTHONPATH=/app/src
    env_file:
      - .env
    depends_on:
      - db-test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-test:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${TEST_DB_USER}
      POSTGRES_PASSWORD: ${TEST_DB_PASSWORD}
      POSTGRES_DB: ${TEST_DB_NAME}