services:
  agent:
    build:
      context: .
      dockerfile: src/Dockerfile
    env_file:
      - .env
    depends_on:
      - db-test

  db-test:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${TEST_DB_USER}
      POSTGRES_PASSWORD: ${TEST_DB_PASSWORD}
      POSTGRES_DB: ${TEST_DB_NAME}